<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- fundo -->
  <rect width="64" height="64" rx="14" fill="#1E2C42"/>

  <!-- trilho da barra -->
  <rect x="10" y="38" width="44" height="8" rx="4" fill="#2A3C58"/>

  <!-- parte preenchida (progresso) -->
